<!DOCTYPE html>
<html>

<head>
    <title>Responsive Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        hr {
            border: none;
            height: 4px;
            background-color: orange;
            width: 100%;
            margin: auto;
        }

        .gallery {
            width: 90%;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 0 8px gray;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h1> College Gallery</h1>
    <hr>

        <img src="C:\Users\Asus\Desktop\html\images\Sri_Sai_College_Of_Engg._^_Tech_Pathankot_-_panoramio.jpg"alt="Image 2">
        <img src="C:\Users\Asus\Desktop\html\images\ssgi4.jpg"alt="Image 3">
        <img src="C:\Users\Asus\Desktop\html\images\j.jpg"alt="Image 4">
    </div>

</body>

</html>
